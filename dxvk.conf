# Project-level DXVK configuration for the Remix DX11 runtime.
# Keep only settings here that are broadly safe across games, engines,
# emulators, and GPU vendors.

# Delay surface creation until the first present so mixed startup paths do not
# end up with a black window.
dxgi.deferSurfaceCreation = True

# Do not spoof the adapter vendor. Leaving the real GPU identity in place avoids
# vendor-specific compatibility branches in games.
dxgi.nvapiHack = False

# Preserve the platform default present behavior instead of forcing a single
# mode globally.
dxgi.tearFree = Auto

# Let DXVK size the compiler thread pool for the local machine.
dxvk.numCompilerThreads = 0

# Keep hardware-sensitive DXVK paths on automatic selection.
dxvk.useRawSsbo = Auto
dxvk.halveNvidiaHVVHeap = Auto

# Leave the DXVK HUD off by default so Remix owns the visible final frame.
dxvk.hud = none
