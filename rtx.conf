# Project-level Remix configuration for the DX11 fork.
# Keep this file limited to engine-agnostic compatibility settings.
# User-specific image quality and debugging preferences should stay in user.conf.

# Prefer runtime auto-detection over engine-specific overrides.
rtx.camera.correctProjectionYFlip = True
rtx.enableRaytracing = True
rtx.sceneKeepAliveFrames = 2

# Keep startup responsive while the runtime compiles or finalizes shaders.
rtx.initializer.asyncShaderPrewarming = True
rtx.initializer.asyncShaderFinalizing = True
rtx.shader.enableAsyncCompilation = True
rtx.shader.enableAsyncCompilationUI = True
rtx.shader.asyncCompilationThrottleMilliseconds = 33

# Keep the runtime UI/input path on the legacy game-window implementation.
rtx.showUI = 0
rtx.useNewGuiInputMethod = False
rtx.blockInputToGameInUI = False

# Preserve broadly compatible material behavior.
rtx.enableDecalMaterialBlending = True

# Use the runtime's local replacement content by default.
rtx.baseGameModPathRegex = ""